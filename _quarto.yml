project:
  type: book

book:
  title: "Research Ideas"
  author: "Rémi Thériault"
  description: "A public research idea garden for students, collaborators, and curious readers."
  search: true
  repo-url: https://github.com/rempsyc/research-ideas
  repo-actions: [source, edit, issue]
  chapters:
    - index.qmd
    - roadmap.qmd
    - active-projects.qmd
    - open-questions.qmd
    - collaboration-opportunities.qmd
    - methods-and-measures.qmd
    - quartz-demo.qmd
    - part: "Ideas"
      chapters:
        - ideas/index.qmd
        - ideas/seed-ideas.qmd
        - ideas/developing-ideas.qmd
        - ideas/mature-ideas.qmd
        - ideas/template.qmd
    - part: "Projects"
      chapters:
        - projects/index.qmd
        - projects/book-interventions.qmd
        - projects/polarization-interventions.qmd
        - projects/ai-simulations.qmd
    - part: "Domains"
      chapters:
        - domains/index.qmd
        - domains/polarization.qmd
        - domains/prosociality.qmd
        - domains/social-identity.qmd
        - domains/contemplative-science.qmd
        - domains/ai-and-society.qmd
    - references.qmd

bibliography: references.bib

format:
  html:
    theme:
      - cosmo
      - brand
    toc: true
    number-sections: false
    code-fold: true
    link-external-newwindow: true

editor: visual
